name: Check TIE Lote
on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install selenium webdriver-manager
      - run: |
          python3 << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.support.ui import Select
          from webdriver_manager.chrome import ChromeDriverManager
          import time, re
          opts = webdriver.ChromeOptions()
          opts.add_argument('--headless')
          opts.add_argument('--no-sandbox')
          opts.add_argument('--disable-dev-shm-usage')
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          driver.get("https://form24.es/en/lote/select")
          time.sleep(3)
          Select(driver.find_element("name", "province")).select_by_visible_text("Málaga")
          time.sleep(2)
          Select(driver.find_element("name", "office")).select_by_visible_text("CNP Málaga Provincial")
          time.sleep(3)
          match = re.search(r'2026/(\d+)', driver.page_source)
          if match:
              lote = match.group(1)
              msg = f"Lote: 2026/{lote}" if int(lote) >= 114 else f"Status: 2026/{lote} (need 114)"
          driver.quit()
          EOF
