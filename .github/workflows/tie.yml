name: Check TIE Lote
on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install selenium webdriver-manager
      - run: |
          python3 << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.support.ui import Select, WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.common.by import By
          from webdriver_manager.chrome import ChromeDriverManager
          import time
          import re
          
          opts = webdriver.ChromeOptions()
          opts.add_argument('--headless')
          opts.add_argument('--no-sandbox')
          opts.add_argument('--disable-dev-shm-usage')
          
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
          
          try:
              driver.get("https://form24.es/en/lote/select")
              time.sleep(5)
              
              WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.NAME, "province")))
              Select(driver.find_element(By.NAME, "province")).select_by_visible_text("Málaga")
              time.sleep(3)
              
              WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.NAME, "office")))
              Select(driver.find_element(By.NAME, "office")).select_by_visible_text("CNP Málaga Provincial")
              time.sleep(5)
              
              source = driver.page_source
              match = re.search(r'2026/(\d+)', source)
              
              if match:
                  lote = match.group(1)
                  print(f"Lote found: {lote}")
              else:
                  print("Could not find lote")
          except Exception as e:
              print(f"Error: {e}")
          finally:
              driver.quit()
          EOF
