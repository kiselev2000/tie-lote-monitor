name: Monitor TIE Lote 114 Málaga

on:
  schedule:
    # Проверка в 8:00 и 20:00 по московскому времени (каждые 12 часов)
    - cron: '0 5,17 * * *'
  workflow_dispatch:  # Кнопка для ручного запуска

jobs:
  check-lote:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests webdriver-manager
    
    - name: Check TIE Lote
      id: check
      run: |
        python << 'EOF'
        from selenium import webdriver
        from selenium.webdriver.common.by import By
        from selenium.webdriver.support.ui import Select
        from selenium.webdriver.support.ui import WebDriverWait
        from selenium.webdriver.support import expected_conditions as EC
        from webdriver_manager.chrome import ChromeDriverManager
        from selenium.webdriver.chrome.service import Service
        import json
        from datetime import datetime
        import sys

        TARGET_LOTE = 114
        PROVINCE = "Málaga"
        OFFICE = "CNP Málaga Provincial"
        
        def check_lote():
            """Получить текущий лот для Малаги"""
            options = webdriver.ChromeOptions()
            options.add_argument('--headless')
            options.add_argument('--no-sandbox')
            options.add_argument('--disable-dev-shm-usage')
            options.add_argument('--disable-blink-features=AutomationControlled')
            options.add_experimental_option("excludeSwitches", ["enable-automation"])
            
            driver = webdriver.Chrome(
                service=Service(ChromeDriverManager().install()),
                options=options
            )
            
            try:
                print(f"[{datetime.now().strftime('%H:%M:%S')}] 🔄 Загрузка form24.es...")
                driver.get("https://form24.es/en/lote/select")
                driver.implicitly_wait(5)
                
                # Выбрать провинцию Málaga
                print(f"[{datetime.now().strftime('%H:%M:%S')}] 📍 Выбор провинции {PROVINCE}...")
                province_select = WebDriverWait(driver, 15).until(
                    EC.presence_of_element_located((By.NAME, "province"))
                )
                Select(province_select).select_by_visible_text(PROVINCE)
                
                driver.implicitly_wait(4)
                
                # Выбрать офис
                print(f"[{datetime.now().strftime('%H:%M:%S')}] 🏢 Выбор офиса {OFFICE}...")
                office_select = WebDriverWait(driver, 15).until(
                    EC.presence_of_element_located((By.NAME, "office"))
                )
                Select(office_select).select_by_visible_text(OFFICE)
                
                driver.implicitly_wait(4)
                
                # Получить номер лота - ищем зелёный текст с форматом "2026/XXX"
                print(f"[{datetime.now().strftime('%H:%M:%S')}] 📊 Получение номера лота...")
                
                # Попытаемся найти лот несколькими способами
                lote_text = None
                lote_num = None
                
                # Способ 1: по CSS селектору
                try:
                    lote_elem = driver.find_element(By.XPATH, "//*[contains(text(), '2026') and contains(text(), '/')]")
                    lote_text = lote_elem.text.strip()
                except:
                    pass
                
                # Способ 2: ждём элемента с числами
                if not lote_text:
                    try:
                        lote_elem = WebDriverWait(driver, 10).until(
                            EC.presence_of_element_located((By.XPATH, "//*[contains(@class, 'lote')]"))
                        )
                        lote_text = lote_elem.text.strip()
                    except:
                        pass
                
                # Способ 3: скриншот для отладки
                if not lote_text:
                    print("⚠️  Не удалось найти лот через селекторы, ищу в странице...")
                    page_text = driver.page_source
                    
                    # Ищем паттерн 2026/XXX
                    import re
                    matches = re.findall(r'2026/\d+', page_text)
                    if matches:
                        lote_text = matches[0]
                
                if lote_text:
                    # Парсим номер (2026/109 → 109)
                    lote_num = int(lote_text.split("/")[-1])
                    print(f"✓ Найден лот: {lote_text}")
                else:
                    print("✗ Не удалось найти номер лота на странице")
                    print(f"Сохраняю скриншот для отладки...")
                    driver.save_screenshot('debug_screenshot.png')
                    return False
                
                # Сохраняем результат
                result = {
                    'lote_text': lote_text,
                    'lote_num': lote_num,
                    'target': TARGET_LOTE,
                    'timestamp': datetime.now().isoformat(),
                    'ready': lote_num >= TARGET_LOTE,
                    'remaining': TARGET_LOTE - lote_num if lote_num < TARGET_LOTE else 0
                }
                
                with open('lote_result.json', 'w') as f:
                    json.dump(result, f, indent=2)
                
                print(f"{'='*50}")
                print(f"Текущий лот: {lote_text}")
                print(f"Целевой лот: 2026/{TARGET_LOTE}")
                print(f"Статус: {'✅ ГОТОВ!' if result['ready'] else f'⏳ Осталось {result[\"remaining\"]}'}")
                print(f"{'='*50}")
                
                return result['ready']
                
            except Exception as e:
                print(f"✗ Критическая ошибка: {e}")
                import traceback
                traceback.print_exc()
                return False
            finally:
                try:
                    driver.quit()
                except:
                    pass
        
        # Запустить проверку
        success = check_lote()
        sys.exit(0 if success else 1)
        EOF
    
    - name: Read result
      if: always()
      id: result
      run: |
        if [ -f lote_result.json ]; then
          cat lote_result.json
          READY=$(python -c "import json; print(json.load(open('lote_result.json'))['ready'])")
          echo "READY=$READY" >> $GITHUB_OUTPUT
        fi
    
    - name: Send Telegram notification - LOTE READY! 🎉
      if: steps.result.outputs.READY == 'True'
      run: |
        python << 'EOF'
        import json
        import requests
        from datetime import datetime

        TELEGRAM_TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
        TELEGRAM_CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
        
        with open('lote_result.json', 'r') as f:
            result = json.load(f)
        
        lote_text = result['lote_text']
        target = result['target']
        
        message = f"""
🎉 <b>ВАШ ЛОТ ГОТОВ!</b> 🎉

<b>Текущий лот:</b> {lote_text}
<b>Ваш целевой лот:</b> 2026/{target}

✅ <b>Лот 2026/{lote_text.split('/')[-1]} >= 2026/{target}</b>

<b>🚀 ДЕЙСТВИЯ:</b>

1️⃣ Откройте <a href="https://form24.es/en/lote/select">форме24</a>
2️⃣ Подтвердите что ваш лот готов
3️⃣ Заходите на <a href="https://icp.administracionelectronica.gob.es">Sede Electrónica</a>
4️⃣ Забронируйте <b>cita previa</b> для получения TIE

<b>📍 CNP Málaga Provincial</b>
Plaza de Manuel Azaña, 3

<b>Нужны:</b>
• Паспорт (действующий)
• Resguardo (квитанция от хуэльяс)
• Доказательство платежа тасы 790-012

<b>Процесс:</b> 5-10 минут в кабинете
        """
        
        url = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage"
        response = requests.post(url, json={
            "chat_id": TELEGRAM_CHAT_ID,
            "text": message,
            "parse_mode": "HTML"
        })
        
        if response.status_code == 200:
            print("✅ Уведомление о готовности отправлено в Telegram!")
        else:
            print(f"❌ Ошибка Telegram: {response.text}")
        EOF
    
    - name: Send Telegram notification - Still waiting ⏳
      if: steps.result.outputs.READY != 'True' && always()
      run: |
        python << 'EOF'
        import json
        import requests
        from datetime import datetime

        TELEGRAM_TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
        TELEGRAM_CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
        
        try:
            with open('lote_result.json', 'r') as f:
                result = json.load(f)
            
            lote_text = result['lote_text']
            target = result['target']
            remaining = result['remaining']
            
            message = f"""
📊 <b>Статус проверки лота</b>

<b>Текущий лот:</b> {lote_text}
<b>Ваш целевой лот:</b> 2026/{target}

⏳ <b>Осталось:</b> {remaining} позиций

✨ Очень близко! 
Вероятно готово в течение 1-2 дней.

🔄 Следующая проверка через 12 часов.

<b>Telegram бот следит за вашим лотом 24/7</b> 🤖
            """
            
            url = f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage"
            response = requests.post(url, json={
                "chat_id": TELEGRAM_CHAT_ID,
                "text": message,
                "parse_mode": "HTML"
            })
            
            if response.status_code == 200:
                print("✅ Статус отправлен в Telegram")
            else:
                print(f"❌ Ошибка: {response.text}")
        except:
            print("Файл результата не найден")
        EOF
